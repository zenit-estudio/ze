<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>zenit_lab</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<div class="download-modal" id="downloadModal">

  <div class="download-box">

    <h3>Descargar perfil / servicios</h3>

    <div class="download-actions">

      <button id="closeDownload">
        Cerrar
      </button>

      <a
        href="img/servicios_cm.pdf"
        download
      >
        Descargar
      </a>

    </div>

  </div>

</div>

<!-- NUEVO MODAL: Descargar costos promocionales -->
<div class="download-modal" id="modalCostos">

  <div class="download-box">

    <h3>Descargar costos promocionales</h3>

    <div class="download-actions">

      <button id="closeCostos">
        Cerrar
      </button>

      <a
        href="img/costos_promo.pdf"
        download
      >
        Descargar
      </a>

    </div>

  </div>

</div>

<body>

  <main class="site-container">

    <!-- BLOQUE 01 -->
<section class="hero-section">

  <!-- FONDO -->

  <img
    src="img/fondoweb_01.png"
    alt=""
  />


  <!-- LOGO + ESTRELLAS -->
<div class="logo-wrapper">

  <img class="stars" src="img/stars.svg" alt="">

  <img class="logo" src="img/logo.svg" alt="">

  <img class="logoname" src="img/name.svg" alt="">

</div>

</section>

    <!-- BLOQUE 02 -->
    <section class="section-static">
      <img
        src="img/fondoweb_02.png"
        alt=""
      />
    </section>

    <!-- BLOQUE PROMO -->
    <section class="promo-section">

      <!-- SLIDER -->
      <div class="promo-slider">

        <img
          class="promo-image active"
          src="img/fondoweb_03_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_04_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_05_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_06_promo.png"
          alt=""
        />

        <img
          class="promo-image"
          src="img/fondoweb_07_promo.png"
          alt=""
        />

      </div>

      <!-- CONTROLES -->
      <div class="promo-controls">

        <button
  class="promo-btn prev-btn"
  aria-label="Anterior"
></button>

<button
  class="promo-btn next-btn"
  aria-label="Siguiente"
></button>

    </section>

<!-- BLOQUE ANTES 08 -->
<section class="before08-section">

  <img
    src="img/fondo_webantes08.svg"
    alt=""
  />
<a
    class="download-area trigger-costos"
    href="javascript:void(0)"
    aria-label="Descargar costos"
  ></a>

  <a
    class="wsp-area"
    href="#"
    aria-label="WhatsApp"
  ></a>
</section>


    <!-- BLOQUE CONTACTO -->
    <section class="contact-section">

  <a
    class="portfolio-link"
    href="portfolio.html"
  >
    <img
      src="img/fondoweb_08.png"
      alt=""
    />
  </a>

      <!-- BOTONES -->
   

    </section>

    <!-- PORTFOLIO -->
    <section class="portfolio-entry">


<img src="img/fondo_web09_contacto.svg" alt="" />
   <div class="contact-buttons">

        <a
          class="contact-btn"
          href="https://wa.me/5490342548563"
          target="_blank"
          aria-label="WhatsApp"
        >
          <img
            src="img/icono-wsp.png"
            alt=""
          />
        </a>

        <a
          class="contact-btn"
          href="mailto:vectoreszin@gmail.com"
          aria-label="Enviar email"
        >
          <img
            src="img/icono-mail.png"
            alt=""
          />
        </a>

        

      </div>

    </section>

    <!-- BLOQUE FINAL -->
<section class="section-static footer-download">

  <img
    src="img/fondoweb_10.png"
    alt=""
  />

  <a class="download-trigger" href="#">

  <img
    class="download-icon"
    src="img/descargar.svg"
    alt="Descargar"
  />

</a>

</section>
</main>

<script src="js/main.js"></script>

</body>

</html>
